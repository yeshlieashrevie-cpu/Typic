<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Typic — Order Tickets</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  body{ padding: 18px 18px 60px; max-width: 640px; margin: 0 auto; }
  .login-box{ max-width:360px; margin: 90px auto 0; padding:28px; }
  .login-box .input{ margin-bottom:12px; }
  .admin-header{ display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:18px; gap:12px; }
  .tab-row{ display:flex; gap:8px; margin-bottom:18px; }
  .tab-btn{ flex:1; padding:11px; border-radius:999px; background:var(--paper-strong); border:1px solid var(--paper-border); font-weight:700; font-size:12.5px; color:var(--ink-soft); }
  .tab-btn.active{ background: var(--gradient-accent); color:#fff; box-shadow: 0 0 16px -4px rgba(167,139,250,0.7); }
  .ticket{ margin-bottom: 20px; padding:0; overflow:hidden; }
  .ticket-head{ padding:16px 18px; border-bottom:1px dashed var(--line); }
  .ticket-code{ font-family:var(--font-mono); font-weight:700; font-size:14px; }
  .ticket-date{ font-size:11.5px; color:var(--ink-soft); margin-top:2px; }
  .ticket-body{ padding: 4px 18px 18px; }
  .ticket-section-label{ font-family: var(--font-mono); font-size:10.5px; text-transform:uppercase; letter-spacing:.06em; color:var(--ink-faint); margin: 16px 0 8px; }
  .ticket-line{ display:flex; gap:12px; align-items:center; padding:10px 0; border-bottom:1px solid var(--line); }
  .ticket-line:last-child{ border-bottom:none; }
  .ticket-line img{ width:52px; height:52px; border-radius:10px; object-fit:contain; background:var(--coal); flex-shrink:0; border:1px solid var(--line); }
  .ticket-line-info{ flex:1; min-width:0; }
  .ticket-line-name{ font-weight:700; font-size:13.5px; }
  .ticket-line-meta{ font-size:11.5px; color:var(--ink-soft); margin-top:2px; }
  .ticket-line-price{ font-family:var(--font-mono); font-weight:700; font-size:13px; flex-shrink:0; }
  .ticket-totals{ margin-top:14px; padding-top:12px; border-top:1px dashed var(--line); }
  .ticket-totals .row{ display:flex; justify-content:space-between; font-size:13px; padding:4px 0; color:var(--ink-soft); }
  .ticket-totals .row--total{ color:var(--ink); font-weight:800; font-size:16px; padding-top:8px; }
  .ticket-customer{ font-size:13px; color:var(--ink-soft); line-height:1.7; padding-top:14px; }
  .ticket-customer strong{ color:var(--ink); font-family: var(--font-display); }
  .feedback-card{ padding:16px 18px; margin-bottom:12px; }
  .feedback-card p{ font-size:13.5px; }
  .feedback-card .meta{ font-size:11px; color:var(--ink-faint); margin-top:8px; }
  .empty-note{ text-align:center; color:var(--ink-soft); padding:50px 0; font-size:13.5px; }
</style>
</head>
<body>

<div id="loginScreen" class="cell login-box">
  <p class="eyebrow">Typic admin</p>
  <h2 style="font-family:var(--font-display); font-weight:800; font-size:22px; margin-top:8px;">Log in</h2>
  <p class="field-hint" style="margin:8px 0 18px;">Use the admin login you created in Supabase.</p>
  <input class="input" type="email" id="loginEmail" placeholder="you@email.com" autocomplete="username">
  <input class="input" type="password" id="loginPassword" placeholder="Password" autocomplete="current-password">
  <button class="btn btn--primary btn--block" id="loginBtn" type="button" style="margin-top:14px;">Log in</button>
  <p class="field-hint form-error" id="loginError" role="alert"></p>
</div>

<div id="adminScreen" hidden>
  <div class="admin-header">
    <div>
      <p class="eyebrow">Typic admin</p>
      <h2 style="font-family:var(--font-display); font-weight:800; font-size:22px;">Order tickets</h2>
    </div>
    <button class="btn btn--ghost" id="logoutBtn" type="button">Log out</button>
  </div>

  <div class="tab-row">
    <button class="tab-btn active" type="button" data-tab="orders">Orders</button>
    <button class="tab-btn" type="button" data-tab="feedback">Feedback</button>
    <button class="tab-btn" type="button" data-tab="signups">Email list</button>
  </div>

  <div id="ordersPane"></div>
  <div id="feedbackPane" hidden></div>
  <div id="signupsPane" hidden></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = 'https://qcsdzvpncatlvcudvbuh.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFjc2R6dnBuY2F0bHZjdWR2YnVoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ2OTUxNzcsImV4cCI6MjEwMDI3MTE3N30.nJyR2owD8i8DXJj12FM9QgVrJuFdCCG_FO8Q-kRchA8';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const $ = (sel) => document.querySelector(sel);

  function formatPHP(n){ return '₱' + Math.round(n || 0).toLocaleString('en-PH'); }
  function formatDate(iso){
    const d = new Date(iso);
    return d.toLocaleString('en-PH', { dateStyle: 'medium', timeStyle: 'short' });
  }
  function designImgPath(designId){
    const folder = String(designId).startsWith('B') ? 'BlackCollection' : 'WhiteCollection';
    return `${folder}/${designId}.png`;
  }
  function escapeHtml(str){
    const div = document.createElement('div');
    div.textContent = str ?? '';
    return div.innerHTML;
  }

  async function checkSession(){
    const { data: { session } } = await sb.auth.getSession();
    if (session) showAdmin(); else showLogin();
  }

  function showLogin(){
    $('#loginScreen').hidden = false;
    $('#adminScreen').hidden = true;
  }

  function showAdmin(){
    $('#loginScreen').hidden = true;
    $('#adminScreen').hidden = false;
    loadOrders();
  }

  $('#loginBtn').addEventListener('click', async () => {
    const email = $('#loginEmail').value.trim();
    const password = $('#loginPassword').value;
    $('#loginError').textContent = '';
    const { error } = await sb.auth.signInWithPassword({ email, password });
    if (error) {
      $('#loginError').textContent = 'Could not log in — check your email and password.';
      return;
    }
    showAdmin();
  });

  $('#logoutBtn').addEventListener('click', async () => {
    await sb.auth.signOut();
    showLogin();
  });

  document.querySelectorAll('.tab-btn').forEach((btn) => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach((b) => b.classList.toggle('active', b === btn));
      const tab = btn.dataset.tab;
      $('#ordersPane').hidden = tab !== 'orders';
      $('#feedbackPane').hidden = tab !== 'feedback';
      $('#signupsPane').hidden = tab !== 'signups';
      if (tab === 'orders') loadOrders();
      if (tab === 'feedback') loadFeedback();
      if (tab === 'signups') loadSignups();
    });
  });

  async function loadOrders(){
    const pane = $('#ordersPane');
    pane.innerHTML = '<p class="empty-note">Loading orders…</p>';
    const { data, error } = await sb.from('orders').select('*').order('created_at', { ascending: false });
    if (error) { pane.innerHTML = `<p class="empty-note">Could not load orders — ${escapeHtml(error.message)}</p>`; return; }
    if (!data.length) { pane.innerHTML = '<p class="empty-note">No orders yet.</p>'; return; }
    pane.innerHTML = data.map(renderTicket).join('');
  }

  function renderTicket(order){
    const designsHtml = (order.designs || []).map((d) => `
      <div class="ticket-line">
        <img src="${designImgPath(d.design_id)}" alt="${escapeHtml(d.label)}" onerror="this.style.opacity='0.2'">
        <div class="ticket-line-info">
          <div class="ticket-line-name">${escapeHtml(d.label)} &middot; ${escapeHtml(d.size)} ${d.color === 'black' ? 'Black' : 'White'}</div>
          <div class="ticket-line-meta">${d.personalize ? `&ldquo;${escapeHtml(d.personalize)}&rdquo;` : 'No custom text'}</div>
        </div>
        <div class="ticket-line-price">${formatPHP(d.price)}</div>
      </div>
    `).join('');

    return `
      <div class="cell ticket">
        <div class="ticket-head">
          <div class="ticket-code">${escapeHtml(order.order_code)}</div>
          <div class="ticket-date">${formatDate(order.created_at)}</div>
        </div>
        <div class="ticket-body">
          <div class="ticket-customer">
            <strong>${escapeHtml(order.first_name)} ${escapeHtml(order.last_name)}</strong><br>
            ${escapeHtml(order.phone)} &middot; ${escapeHtml(order.email)}${order.messenger ? ` &middot; ${escapeHtml(order.messenger)}` : ''}<br>
            ${escapeHtml(order.address?.street)}, ${escapeHtml(order.address?.barangay)}<br>
            ${escapeHtml(order.address?.city)}, ${escapeHtml(order.address?.province)} ${escapeHtml(order.address?.zip)}
          </div>

          <p class="ticket-section-label">Designs</p>
          ${designsHtml}

          <div class="ticket-totals">
            <div class="row"><span>Subtotal</span><span>${formatPHP(order.subtotal)}</span></div>
            <div class="row"><span>${order.shipping_method === 'jnt' ? 'J&T Express' : 'Lalamove'}${order.shipping_rush ? ' (Rush)' : ''}</span><span>${formatPHP(order.shipping_rate)}</span></div>
            <div class="row row--total"><span>Total</span><span>${formatPHP(order.total)}</span></div>
          </div>
        </div>
      </div>
    `;
  }

  async function loadFeedback(){
    const pane = $('#feedbackPane');
    pane.innerHTML = '<p class="empty-note">Loading…</p>';
    const { data, error } = await sb.from('feedback').select('*').order('created_at', { ascending: false });
    if (error) { pane.innerHTML = `<p class="empty-note">${escapeHtml(error.message)}</p>`; return; }
    if (!data.length) { pane.innerHTML = '<p class="empty-note">No feedback yet.</p>'; return; }
    pane.innerHTML = data.map((f) => `
      <div class="cell feedback-card">
        <p>${escapeHtml(f.message)}</p>
        <p class="meta">${formatDate(f.created_at)}</p>
      </div>
    `).join('');
  }

  async function loadSignups(){
    const pane = $('#signupsPane');
    pane.innerHTML = '<p class="empty-note">Loading…</p>';
    const { data, error } = await sb.from('email_signups').select('*').order('created_at', { ascending: false });
    if (error) { pane.innerHTML = `<p class="empty-note">${escapeHtml(error.message)}</p>`; return; }
    if (!data.length) { pane.innerHTML = '<p class="empty-note">No signups yet.</p>'; return; }
    pane.innerHTML = data.map((s) => `
      <div class="cell feedback-card">
        <p style="font-family:var(--font-mono); font-weight:700;">${escapeHtml(s.email)}</p>
        <p class="meta">${formatDate(s.created_at)}</p>
      </div>
    `).join('');
  }

  checkSession();
</script>
</body>
</html>
